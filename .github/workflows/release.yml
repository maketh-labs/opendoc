name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun test tests/unit

      - name: Run integration tests
        run: bun test tests/integration

  build:
    name: Build binaries
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build all platform binaries
        run: bun run scripts/build.ts

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: npm/*/bin/

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: npm-bins

      # Copy binaries back to npm/* directories
      - name: Restore binary paths
        run: |
          for pkg in opendoc-darwin-arm64 opendoc-darwin-x64 opendoc-linux-x64 opendoc-linux-arm64 opendoc-win32-x64; do
            mkdir -p npm/$pkg/bin
            cp -r npm-bins/$pkg/bin/. npm/$pkg/bin/ 2>/dev/null || true
            chmod +x npm/$pkg/bin/opendoc 2>/dev/null || true
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      # Sync version from git tag into all package.json files
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing version: $VERSION"
          # Update main package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          # Update platform package.json files
          for pkg in opendoc-darwin-arm64 opendoc-darwin-x64 opendoc-linux-x64 opendoc-linux-arm64 opendoc-win32-x64; do
            node -e "
              const fs = require('fs');
              const path = 'npm/$pkg/package.json';
              const p = JSON.parse(fs.readFileSync(path, 'utf-8'));
              p.version = '$VERSION';
              fs.writeFileSync(path, JSON.stringify(p, null, 2) + '\n');
            "
          done

      # Publish platform packages first
      - name: Publish platform packages
        run: |
          for pkg in opendoc-darwin-arm64 opendoc-darwin-x64 opendoc-linux-x64 opendoc-linux-arm64 opendoc-win32-x64; do
            cd npm/$pkg
            npm publish --provenance --access public || true
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Then publish main package
      - name: Publish main package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: release-bins
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-bins/**/*
          generate_release_notes: true
