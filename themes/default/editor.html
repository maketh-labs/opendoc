<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenDoc Editor</title>
  <style>
    :root {
      --color-bg: #ffffff;
      --color-surface: #f8f8f8;
      --color-text: #1a1a1a;
      --color-muted: #666666;
      --color-accent: #0066ff;
      --color-accent-hover: #0052cc;
      --color-border: #e5e5e5;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --border-radius: 6px;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --color-bg: #1a1a2e;
        --color-surface: #16213e;
        --color-text: #e0e0e0;
        --color-muted: #999999;
        --color-accent: #4da6ff;
        --color-accent-hover: #80bfff;
        --color-border: #2a2a4a;
      }
    }
    [data-theme="dark"] {
      --color-bg: #1a1a2e;
      --color-surface: #16213e;
      --color-text: #e0e0e0;
      --color-muted: #999999;
      --color-accent: #4da6ff;
      --color-accent-hover: #80bfff;
      --color-border: #2a2a4a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .editor-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    .editor-header .logo {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .editor-header .repo-name {
      color: var(--color-muted);
      font-size: 0.85rem;
    }
    .editor-header .page-path {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--color-accent);
    }
    .editor-header .spacer { flex: 1; }
    .editor-header .status {
      font-size: 0.8rem;
      color: var(--color-muted);
    }
    .btn {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--color-muted); }
    .btn-primary {
      background: var(--color-accent);
      color: #fff;
      border-color: var(--color-accent);
    }
    .btn-primary:hover { background: var(--color-accent-hover); }
    .editor-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
    }
    .editor-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-pane:first-child {
      border-right: 1px solid var(--color-border);
    }
    .pane-header {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-muted);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
    }
    #editor-textarea {
      flex: 1;
      width: 100%;
      padding: 1rem;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.6;
      background: var(--color-bg);
      color: var(--color-text);
      tab-size: 2;
    }
    #preview {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      line-height: 1.7;
    }
    #preview h1 { font-size: 1.8rem; margin-bottom: 0.75rem; }
    #preview h2 { font-size: 1.4rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    #preview h3 { font-size: 1.15rem; margin-top: 1.25rem; margin-bottom: 0.4rem; }
    #preview p { margin-bottom: 0.75rem; }
    #preview code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--color-surface);
      padding: 0.15em 0.35em;
      border-radius: 3px;
    }
    #preview pre {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      padding: 0.75rem;
      overflow-x: auto;
      margin-bottom: 0.75rem;
    }
    #preview pre code { background: none; padding: 0; }
    #preview a { color: var(--color-accent); }
    #preview ul, #preview ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    #preview blockquote {
      border-left: 3px solid var(--color-accent);
      padding-left: 0.75rem;
      color: var(--color-muted);
      margin-bottom: 0.75rem;
    }

    /* Login screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .login-box {
      text-align: center;
      padding: 3rem;
    }
    .login-box h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    .login-box p {
      color: var(--color-muted);
      margin-bottom: 1.5rem;
    }
    .login-box .btn { font-size: 1rem; padding: 0.6rem 1.5rem; }

    /* Repo picker */
    .repo-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }
    .repo-picker-box {
      width: 400px;
      padding: 2rem;
    }
    .repo-picker-box h2 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }
    .repo-picker-box select,
    .repo-picker-box input[type="text"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }
    .repo-picker-box .or-divider {
      text-align: center;
      color: var(--color-muted);
      font-size: 0.8rem;
      margin-bottom: 0.75rem;
    }

    @media (max-width: 768px) {
      .editor-panels { grid-template-columns: 1fr; }
      .editor-pane:first-child { border-right: none; border-bottom: 1px solid var(--color-border); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/client/editor.ts"></script>
</body>
</html>
